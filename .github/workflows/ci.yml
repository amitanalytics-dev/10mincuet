name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx eslint . --max-warnings 0
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Build
        env:
          NEXT_PUBLIC_BASE_URL: https://10mincuet.com
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-min
        run: npm run build
